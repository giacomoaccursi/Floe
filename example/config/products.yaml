name: "products"
description: "Product catalog"
version: "1.0"
owner: "data-team"

source:
  type: "file"
  path: "example/data/products.csv"
  format: "csv"
  options:
    header: "true"
    delimiter: ","

schema:
  enforceSchema: true
  allowExtraColumns: true
  columns:
    - name: "product_id"
      type: "integer"
      nullable: false
      description: "Unique product identifier"
    - name: "product_name"
      type: "string"
      nullable: false
      description: "Product name"
    - name: "category"
      type: "string"
      nullable: false
      description: "Product category"
    - name: "price"
      type: "double"
      nullable: false
      description: "Product unit price"
    - name: "stock_quantity"
      type: "integer"
      nullable: false
      description: "Available stock quantity"
    - name: "supplier_code"
      type: "string"
      nullable: true
      description: "Supplier reference code"
    - name: "last_updated"
      type: "timestamp"
      nullable: false
      description: "Last update timestamp"

loadMode:
  type: "delta"
  mergeStrategy: "upsert"
  updateTimestampColumn: "last_updated"

validation:
  primaryKey:
    - "product_id"
  foreignKeys: []
  rules:
    - type: "domain"
      column: "category"
      domainName: "product_category"
      onFailure: "reject"
    - type: "range"
      column: "price"
      min: 0.01
      max: 999999.99
      onFailure: "reject"
    - type: "range"
      column: "stock_quantity"
      min: 0
      onFailure: "reject"

output:
  format: "parquet"
  compression: "snappy"

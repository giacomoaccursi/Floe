name: "products"
description: "Product catalog - delta upsert by last_updated timestamp"
version: "2.0"
owner: "data-team"

source:
  type: "file"
  path: "example/data/products.csv"
  format: "csv"
  options:
    header: "true"
    delimiter: ","

schema:
  enforceSchema: true
  allowExtraColumns: true
  columns:
    - name: "product_id"
      type: "integer"
      nullable: false
      description: "Unique product identifier"
    - name: "product_name"
      type: "string"
      nullable: false
      description: "Product name"
    - name: "category"
      type: "string"
      nullable: false
      description: "Product category"
    - name: "price"
      type: "double"
      nullable: false
      description: "Product unit price"
    - name: "stock_quantity"
      type: "integer"
      nullable: false
      description: "Available stock quantity"
    - name: "supplier_code"
      type: "string"
      nullable: true
      description: "Supplier reference code"
    - name: "last_updated"
      type: "timestamp"
      nullable: false
      description: "Last update timestamp"

loadMode:
  type: "delta"

validation:
  primaryKey:
    - "product_id"
  foreignKeys: []
  rules:
    - type: "domain"
      column: "category"
      domainName: "product_category"
      description: "Category must be a valid product category"
      onFailure: "reject"
    - type: "range"
      column: "price"
      min: 0.01
      max: 999999.99
      description: "Price must be between 0.01 and 999,999.99"
      onFailure: "reject"
    - type: "range"
      column: "stock_quantity"
      min: 0
      description: "Stock quantity cannot be negative"
      onFailure: "reject"
    - type: "regex"
      column: "supplier_code"
      pattern: "^SUP-\\d{3}$"
      skipNull: true
      description: "Supplier code must match SUP-NNN format"
      onFailure: "warn"

output:
  format: "parquet"
  compression: "snappy"

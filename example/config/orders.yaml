name: "orders"
description: "Customer orders - delta upsert with FK validation against customers and products"
version: "2.0"
owner: "data-team"

source:
  type: "file"
  path: "example/data/orders.csv"
  format: "csv"
  options:
    header: "true"
    delimiter: ","

schema:
  enforceSchema: true
  allowExtraColumns: false
  columns:
    - name: "order_id"
      type: "integer"
      nullable: false
      description: "Unique order identifier"
    - name: "customer_id"
      type: "integer"
      nullable: false
      description: "Foreign key to customers"
    - name: "product_id"
      type: "integer"
      nullable: false
      description: "Foreign key to products"
    - name: "quantity"
      type: "integer"
      nullable: false
      description: "Quantity ordered"
    - name: "order_date"
      type: "date"
      nullable: false
      description: "Date order was placed"
    - name: "status"
      type: "string"
      nullable: false
      description: "Order status"
    - name: "total_amount"
      type: "decimal"
      nullable: false
      description: "Total order amount"

loadMode:
  type: "delta"

validation:
  primaryKey:
    - "order_id"
  foreignKeys:
    - name: "fk_customer"
      column: "customer_id"
      references:
        flow: "customers"
        column: "customer_id"
    - name: "fk_product"
      column: "product_id"
      references:
        flow: "products"
        column: "product_id"
  rules:
    - type: "domain"
      column: "status"
      domainName: "order_status"
      description: "Status must be a valid order status"
      onFailure: "reject"
    - type: "range"
      column: "quantity"
      min: "1"
      max: "1000"
      description: "Quantity must be between 1 and 1000"
      onFailure: "reject"
    - type: "range"
      column: "total_amount"
      min: "0.01"
      description: "Total amount must be positive"
      onFailure: "reject"

output:
  format: "parquet"
  partitionBy:
    - "status"
  compression: "snappy"

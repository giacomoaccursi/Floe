name: "orders"
description: "Customer orders"
version: "1.0"
owner: "data-team"

source:
  type: "file"
  path: "example/data/orders.csv"
  format: "csv"
  options:
    header: "true"
    delimiter: ","

schema:
  enforceSchema: true
  allowExtraColumns: false
  columns:
    - name: "order_id"
      type: "integer"
      nullable: false
      description: "Unique order identifier"
    - name: "customer_id"
      type: "integer"
      nullable: false
      description: "Foreign key to customers"
    - name: "product_id"
      type: "integer"
      nullable: false
      description: "Foreign key to products"
    - name: "quantity"
      type: "integer"
      nullable: false
      description: "Quantity ordered"
    - name: "order_date"
      type: "date"
      nullable: false
      description: "Date order was placed"
    - name: "status"
      type: "string"
      nullable: false
      description: "Order status"
    - name: "total_amount"
      type: "decimal"
      nullable: false
      description: "Total order amount"

loadMode:
  type: "delta"
  mergeStrategy: "append"

validation:
  primaryKey:
    - "order_id"
  foreignKeys:
    - name: "fk_customer"
      columns:
        - "customer_id"
      reference:
        flow: "customers"
        columns:
          - "customer_id"
    - name: "fk_product"
      columns:
        - "product_id"
      reference:
        flow: "products"
        columns:
          - "product_id"
  rules:
    - type: "domain"
      field: "status"
      domainName: "order_status"
      onFailure: "reject"
    - type: "range"
      field: "quantity"
      min: 1
      max: 1000
      onFailure: "reject"
    - type: "range"
      field: "total_amount"
      min: 0.01
      onFailure: "reject"

transformations:
  postValidation:
    - type: "sql"
      query: |
        SELECT
          o.*,
          c.first_name || ' ' || c.last_name as customer_name,
          c.country as customer_country,
          p.product_name,
          p.category as product_category
        FROM __input__ o
        INNER JOIN customers c ON o.customer_id = c.customer_id
        INNER JOIN products p ON o.product_id = p.product_id

output:
  format: "parquet"
  partitionBy:
    - "status"
  compression: "snappy"

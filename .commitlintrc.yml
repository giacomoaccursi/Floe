extends:
  - "@commitlint/config-conventional"
rules:
  type-enum:
    - 2
    - always
    - [feat, fix, perf, refactor, test, docs, chore]
  header-max-length:
    - 2
    - always
    - 72
  body-max-line-length:
    - 0
    - always
    - 0
  footer-max-line-length:
    - 0
    - always
    - 0

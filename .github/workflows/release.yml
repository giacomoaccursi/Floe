name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

env:
  SPARK_LOCAL_IP: "127.0.0.1"
  JAVA_OPTS: "-Xmx2G"

jobs:
  release:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: sbt

      - uses: sbt/setup-sbt@v1

      - name: Compile
        run: sbt -J-Xss4m compile

      - name: Test
        run: sbt -J-Xss4m test

      - name: Publish
        run: sbt -J-Xss4m publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
